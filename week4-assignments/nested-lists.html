<!DOCTYPE html>
<!-- 
  @file nested-lists.html
  @description Demonstrates nested unordered lists to represent
               hierarchical data (course categories with subtopics).
  @concepts Nested <ul>, <li>, heading hierarchy
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Lists</title>
</head>
<body>
    <h1>Nested Unordered List</h1>
    <h3>GeeksforGeeks Courses List:</h3>

    <!-- Parent list with nested sublists for each course category -->
    <ul>
        <!-- Category 1: DSA with subtopics -->
        <li>DSA</li>
        <ul>
            <li>Arrays</li>
            <li>Linked List</li>
            <li>Stack</li>
            <li>Queue</li>
        </ul>

        <!-- Category 2: Web Development with subtopics -->
        <li>Web Development</li>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </ul>

    <!-- Separate list for other categories -->
    <ul>
        <li>Aptitude</li>
        <li>GATE</li>
        <li>Placement</li>
    </ul>
</body>
</html>
