<!DOCTYPE html>
<html lang="en">
<head>

    <title>Table Design</title>
    <link rel="stylesheet" href="table-style.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <th colspan="4" class="heading">TITLE</th>
            </tr>
            <tr>
                <th colspan="2" class="subtitle">subtitle</th>
                <th colspan="2" class="subtitle">subtitle</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td>1 item</td>
                <td>123</td>
                <td>1 item</td>
                <td>123</td>
            </tr>
            <tr>
                <td colspan="2" class="subtitle">sub subtitle</td>
                <td colspan="2" class="subtitle">sub subtitle</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
